global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: revops-ia-saas
    environment: dev

scrape_configs:
  # Source principale : métriques OTEL exportées par tous les services
  # (backend, orchestrateur, RAG, MCP exposent leurs métriques via OTLP
  # → otel-collector → prometheus exporter sur :8889)
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Métriques internes de l'otel-collector lui-même
  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]
    metrics_path: /metrics
